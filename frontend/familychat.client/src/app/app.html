<main class="app-shell">
  <section class="auth-panel" aria-labelledby="authTitle">
    <div>
      <p class="eyebrow">FamilyChat</p>
    </div>

    @if (currentUser(); as user) {
      <div class="profile">
        @if (user.pictureUrl) {
          <img [src]="user.pictureUrl" alt="" class="avatar">
        }
        <div>
          <strong>{{ user.name || user.email }}</strong>
          @if (user.email) {
            <span>{{ user.email }}</span>
          }
        </div>
      </div>
      <button type="button" class="secondary-button" (click)="logout()">Log out</button>
    } @else {
      <button type="button" class="primary-button" (click)="openLoginDialog()">Login</button>
    }
  </section>

  @if (isLoginDialogOpen()) {
    <div class="dialog-backdrop" role="presentation" (click)="closeLoginDialog()">
      <section class="login-dialog" role="dialog" aria-modal="true" aria-labelledby="loginDialogTitle" (click)="$event.stopPropagation()">
        <div class="dialog-header">
          <h2 id="loginDialogTitle">Login</h2>
          <button type="button" class="icon-button" aria-label="Close login dialog" (click)="closeLoginDialog()">x</button>
        </div>

        <button type="button" class="google-button" (click)="loginWithGoogle()">
          <span class="google-mark" aria-hidden="true">G</span>
          Continue with Google
        </button>
      </section>
    </div>
  }
</main>
